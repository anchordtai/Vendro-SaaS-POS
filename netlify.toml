# Netlify configuration for Onyxx Nightlife POS

[build]
  # Build command for Next.js application
  command = "npm run build"
  # Directory to deploy (Next.js build output)
  publish = ".next"

[build.environment]
  # Set Node.js version
  NODE_VERSION = "20"

# Redirect rules for proper routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:"

# Handle SPA routing
[[redirects]]
  from = "/dashboard/*"
  to = "/dashboard/:splat"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Static file caching
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# API endpoints (if needed in future)
[functions]
  # Directory for Netlify functions
  directory = "netlify/functions"

