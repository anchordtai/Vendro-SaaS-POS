# Netlify configuration for Vendro POS SaaS Platform
# Optimized for Next.js App Router and API routes

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION = "9"
  NEXT_TELEMETRY_DISABLED = "1"
  # Install devDependencies for TypeScript support
  NPM_CONFIG_PRODUCTION = "false"

# API Routes - Handle serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Static assets caching
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# API headers for CORS
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# Production environment variables
[context.production]
  [context.production.environment]
    NODE_ENV = "production"
    NEXT_PUBLIC_SUPABASE_URL = "https://vlksqjwupktmvypfmfur.supabase.co"
    NEXT_PUBLIC_SUPABASE_ANON_KEY = "sb_publishable_W1KzX92aK0WxgBuNyr7ECg_LcZnH6ke"

# Deploy preview environment
